hello<!Doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta
      name="description"
      content="Booking time with tutor"
    >
    <meta name="keywords" content="HTML, Form, tags">
    <meta name="author" content="Sophia">
    <title>CWA Helpdesk Appointment</title>
  </head>

  <body>
    <a href="https://www.swinburne.edu.au">
      <img
        src="images/logo.png"
        alt="Swinburne logo"
        title="Swinburne logo"
        loading="lazy"
      >
    </a>
    <h1>CWA Help Desk Appointment</h1>
    <p>
      The Help Desk is located in ATC620. Open 10:30 to 19:00 Monday to Friday
    </p>
    <p>Check Blackboard for when CWA tutors will be there.</p>
    <form
      method="post"
      action="http://mercury.swin.edu.au/it000000/formtest.php"
    >
      <fieldset>
        <legend>Student Details</legend>
        <p>
          <label for="studentID">Student ID</label>
          <input
            type="text"
            pattern="\d{7,10}"
            name="studentID"
            id="studentID"
            maxlength="20"
            size="10"
            required="required"
          >
        </p>

        <p>
          <label for="givenName">Given Name</label>
          <input
            type="text"
            pattern="[A-Za-z]{1,15}"
            name="givenName"
            id="givenName"
            maxlength="20"
            size="15"
            required="required"
          >

          <label for="familyName">Family Name</label>
          <input
            type="text"
            pattern="[A-Za-z]{1,15}"
            name="familyName"
            id="familyName"
            maxlength="20"
            size="15"
            required="required"
          >
        </p>
      </fieldset>

      <fieldset>
        <legend>Your unit</legend>
        <p>
          <input
            type="radio"
            id="COS1011"
            name="unitCode"
            value="COS1011"
            required
          >
          <label for="COS1011">COS1011</label>

          <input type="radio" id="COS6004" name="unitCode" value="COS6004" >
          <label for="COS6004">COS6004</label>

          <input type="radio" id="COS6007" name="unitCode" value="COS6007" >
          <label for="COS6007">COS6007</label>
        </p>

        <p>
          <label for="tutorName">Your Tutor</label>
          <select name="tutorName" id="tutorName" required>
            <option value="">Please Select</option>
            <option value="Enrique Nicolás Ketterer Ortiz (Nick)">
              Enrique Nicolás Ketterer Ortiz (Nick)
            </option>
            <option value="Rahul Raghavan">Rahul Raghavan</option>
            <option value="Razeen Hashmi">Razeen Hashmi</option>
          </select>
        </p>
      </fieldset>
      <fieldset>
        <legend>Issue</legend>

        <label for="HTML">HTML</label>
        <input
          type="checkbox"
          id="HTML"
          name="category[]"
          value="HTML"
          checked="checked"
        >

        <label for="CSS">CSS</label>
        <input type="checkbox" id="CSS" name="category[]" value="CSS" >
        <label for="Javascript">JavaScript</label>
        <input
          type="checkbox"
          id="Javascript"
          name="category[]"
          value="Javascript"
        >
        <label for="PHP">PHP</label>
        <input type="checkbox" id="PHP" name="category[]" value="PHP" >
        <label for="MySQL">MySQL</label>
        <input type="checkbox" id="MySQL" name="category[]" value="MySQL" >

        <p>
          <label for="description">Description of Issue</label>
        </p>
        <p>
          <textarea
            id="description"
            name="description"
            rows="5"
            cols="40"
            placeholder= "Write description of your problem here..."
          > </textarea>
        </p>
      </fieldset>

      <fieldset>
        <legend>Preferred Date/Time</legend>
        <p>
          <label for="date">Date</label>
          <input
            type="text"
            pattern="\d{1,2}/\d{1,2}/\d{4}"
            name="date"
            id="date"
            placeholder="dd-mm-yyyy"
            size="10"
          >
        </p>
        <p>
          <label for="time">Time</label>
          <input
            type="text"
            pattern="\d{2}:\d{2}"
            name="time"
            id="time"
            placeholder="00:00"
            size="10"
          >
        </p>
      </fieldset>

      <input type="submit" value="Book">
      <input type="reset" value="Reset form" >
    </form>
  </body>
</html>
