<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="description" content="Apply for the position" />
    <meta name="keywords" content="position, details, contact, skills" />
    <meta name="author" content="Sophia" />
    <title>Apply for the position</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <a href="https://www.swinburne.edu.au">
      <img
        src="images/logo.png"
        alt="Swinburne logo"
        title="Swinburne logo"
        loading="lazy"
      />
    </a>
    <h1>Apply</h1>
    <p>
      ????
    </p>
    <p>????</p>
    <form
      method="post"
      action="http://mercury.swin.edu.au/it000000/formtest.php"
    >
      <fieldset>
        <legend>Details</legend>
        <label for="jobRef">Job Reference Number</label>
        <input
          type="text"
          pattern="[A-Za-z0-9]{5}"
          name="jobRef"
          id="jobRef"
          maxlength="5"
          size="10"
          required="required"
        />
        <p>
          <label for="firstName">First Name</label>
          <input
            type="text"
            pattern="[A-Za-z]{1,20}"
            name="firstName"
            id="firstName"
            maxlength="20"
            size="25"
            required="required"
          />

          <label for="lastName">Last Name</label>
          <input
            type="text"
            pattern="[A-Za-z]{1,20}"
            name="lastName"
            id="lastName"
            maxlength="20"
            size="25"
            required="required"
          />
        </p>

        <p>
          <label for="date">Date of birth</label>
          <input
            type="date"
            name="dateofBirth"
            id="dateofBirth"
            placeholder="dd/mm/yyyy"
            size="10"
            required="required"
          />
        </p>
      </fieldset>

      <fieldset>
        <legend>Gender</legend>
        <p>
          <input
            type="radio"
            id="female"
            name="gender"
            value="female"
            required
          />
          <label for="female">Female</label>

          <input type="radio" id="male" name="gender" value="male" />
          <label for="male">Male</label>

          <input
            type="radio"
            id="notspecified"
            name="gender"
            value="notspecified"
          />
          <label for="notspecified">N/S</label>

          <input type="radio" id="prefernot" name="gender" value="??" />
          <label for="prefernot">Prefer not to say</label>
        </p>
      </fieldset>

      <fieldset>
        <legend>Contact details</legend>
        <p>
          <label for="streetAddress">Street address</label>
          <input
            type="text"
            name="streetAddress"
            id="streetAddress"
            maxlength="40"
            size="40"
            required="required"
          />
        </p>
        <p>
          <label for="suburb">Suburb/Town</label>
          <input
            type="text"
            name="suburb"
            id="suburb"
            maxlength="40"
            size="40"
            required="required"
          />
        </p>

        <p>
          <label for="state">State</label>
          <select name="state" id="state" required>
            <option value="">Please Select</option>
            <option value="VIC">VIC</option>
            <option value="NSW">NSW</option>
            <option value="QLD">QLD</option>
            <option value="NT">NT</option>
            <option value="WA">WA</option>
            <option value="SA">SA</option>
            <option value="TAS">TAS</option>
            <option value="ACT">ACT</option>
          </select>
        </p>

        <p>
          <label for="postcode">Postcode</label>
          <input
            type="text"
            pattern="\d{4}"
            name="postcode"
            id="postcode"
            size="4"
            maxlength="4"
            required="required"
          />
        </p>

        <p>
          <label for="email">Email</label>
          <input
            type="text"
            pattern="[a-z0-9._%+-]+@[a-z0-9.-]{2,}\.[a-z]{2,}$"
            name="email"
            id="email"
            size="20"
            required="required"
          />
        </p>
        <p>
          <label for="phone">Phone number</label>
          <input
            type="text"
            pattern="\d{8,12}"
            name="phone"
            id="phone"
            maxlength="12"
            size="12"
            required="required"
          />
        </p>
      </fieldset>
      <fieldset>
        <legend>Skills</legend>
        <label for="HTML">??????</label>
        <input
          type="checkbox"
          id="HTML"
          name="category[]"
          value="HTML"
          checked="checked"
        />

        <label for="CSS">???</label>
        <input type="checkbox" id="CSS" name="category[]" value="CSS" />
        <label for="Javascript">JavaScript</label>
        <input
          type="checkbox"
          id="Javascript"
          name="category[]"
          value="Javascript"
        />
        <label for="PHP">PHP</label>
        <input type="checkbox" id="PHP" name="category[]" value="PHP" />
        <label for="MySQL">MySQL</label>
        <input type="checkbox" id="MySQL" name="category[]" value="MySQL" />
      </fieldset>
      <p>
        <label for="otherSkills">Other skills</label>
      </p>
      <p>
        <textarea
          id="otherSkills"
          name="otherSkills"
          rows="5"
          cols="40"
          placeholder="List other skills here..."
        >
        </textarea>
      </p>

        <input type="submit" value="Book">
      <input type="reset" value="Reset form" >
    </form>
  </body>
</html>
